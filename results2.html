<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        /* --- AUTOCOMPLETE BOX TRANSPARENT FIX --- */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus {
            -webkit-text-fill-color: white !important;
            -webkit-box-shadow: 0 0 0px 1000px transparent inset !important; /* Meka transparent kala */
            transition: background-color 5000s ease-in-out 0s;
        }

        #resultContainer { 
            display: none; opacity: 0; width: 100%; max-width: 1100px;
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #loadingOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98); z-index: 10000;
            flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(20px);
        }

        .loader-ring {
            width: 60px; height: 60px; border: 3px solid rgba(212, 175, 55, 0.05);
            border-top: 3px solid #D4AF37; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Premium Card */
        .profile-card {
            background: linear-gradient(165deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 30px;
            position: relative;
            overflow: hidden;
        }

        .profile-card::after {
            content: ''; position: absolute; top: -50%; left: -100%; width: 50%; height: 200%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.1), transparent);
            transform: rotate(25deg);
            animation: cardShine 5s infinite;
        }
        @keyframes cardShine { 0% { left: -100%; } 20% { left: 150%; } 100% { left: 150%; } }

        /* Table UI */
        .royal-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .royal-table th { color: #D4AF37; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; padding: 15px; opacity: 0.5; }
        .royal-table td { background: rgba(255, 255, 255, 0.02); padding: 20px 10px; text-align: center; border-top: 1px solid rgba(255, 255, 255, 0.03); }
        .royal-table tr td:first-child { border-radius: 20px 0 0 20px; border-left: 1px solid rgba(212, 175, 55, 0.15); }
        .royal-table tr td:last-child { border-radius: 0 20px 20px 0; border-right: 1px solid rgba(212, 175, 55, 0.15); }
        .royal-table tr:hover {color: aliceblue; background: rgba(212, 175, 55, 0.05);}

        @media (max-width: 640px) {
            .profile-card { padding: 1.5rem !important; }
            .rank-display {  }
            .name-display { font-size: 1.8rem !important; }
            .table-val { font-size: 1.4rem !important; }
        }

        .tab-btn { padding: 10px 20px; border-radius: 12px; font-weight: 800; font-size: 10px; letter-spacing: 1px; transition: 0.3s; border: 1px solid rgba(255, 255, 255, 0.05); color: rgba(255,255,255,0.3); }
        .tab-btn.active { background: rgba(212, 175, 55, 0.1); border-color: #D4AF37; color: #D4AF37; }
        /* Page loading animation */
.animate-hero {
    animation: heroFadeUp 1.2s cubic-bezier(0.19, 1, 0.22, 1) forwards;
}

@keyframes heroFadeUp {
    0% { opacity: 0; transform: translateY(30px); }
    100% { opacity: 1; transform: translateY(0); }
}

/* Scroll reveal style */
.scroll-reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
}

.reveal-active {
    opacity: 1 !important;
    transform: translateY(0) !important;
}
@keyframes cardFocus {
    0% { transform: scale(0.95); }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); }
}

.focus-animation {
    animation: cardFocus 0.6s cubic-bezier(0.19, 1, 0.22, 1);
}   
    </style>
</head>
<body class="bg-black text-white overflow-x-hidden">
     <div class="particle-container" id="particle-container">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <div id="loadingOverlay">
        <div class="loader-ring"></div>
        <h2 class="mt-6 tracking-[0.5em] font-bold text-[#D4AF37] text-[12px] uppercase">Please Wait</h2>

 <nav class="nav-blur border-b border-white/5 fixed w-full z-50 px-6 md:px-10 py-5 flex justify-between items-center">

            <div class="flex gap-2 mb-6 justify-center md:justify-start">
                <button class="tab-btn active" id="unitTab" onclick="switchTab('Unit Test')">UNIT TEST</button>
                <button class="tab-btn" id="megaTab" onclick="switchTab('Ranking Test')">RANKING EXAM</button>
            </div>

            <div class="overflow-x-auto mb-12">
                <table class="royal-table">
                    <thead>
                        <tr>
                            <th class="w-[30%]">Exam Name</th>

                            <th class="w-[20%]">Grade</th> <th class="w-[25%]">Rank</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <div class="bg-white/5 border border-white/10 rounded-[30px] p-6 md:p-12 mb-20">
                <h4 class="text-[9px] font-bold tracking-[0.5em] text-white/20 uppercase mb-8 text-center">Progress Analytics</h4>

    <script>
// Global variables

// Global variables
let myChart;
let allStudentData = []; 

// 1. Search Function - හරියටම දත්ත අල්ලන විදිහට
async function searchResult() {
    const indexInput = document.getElementById('indexIn').value.trim();
    const urlParams = new URLSearchParams(window.location.search);
    const targetCity = urlParams.get('city');
    const targetBatch = urlParams.get('batch');

    console.log("Searching Index:", indexInput);
    console.log("URL City/Batch:", targetCity, targetBatch);

    if (!indexInput) {
        alert("Index Number එකක් ඇතුලත් කරන්න!");
        return;
    }

    document.getElementById('resultContainer').style.display = 'none';
    document.getElementById('loadingOverlay').style.display = 'flex';

    try {
        // Step 1: Index එක විතරක් අරන් Database එකෙන් Check කරමු
        const { data, error } = await sbClient
            .from('results')
            .select('*')
            .eq('student_index', indexInput);

        if (error) throw error;
        
        if (!data || data.length === 0) {
            alert("මෙම Index Number එකට දත්ත හමු නොවීය. Index එක වැරදිද බලන්න!");
            document.getElementById('loadingOverlay').style.display = 'none';
            return;
        }

        // Step 2: Database එකේ එන data ටික අපේ URL එකේ city/batch එකට match වෙනවද බලන්න (Client-side filtering)
        const filteredData = data.filter(item => 
            String(item.city).toLowerCase() === String(targetCity).toLowerCase() && 
            String(item.batch).toLowerCase() === String(targetBatch).toLowerCase()
        );

        if (filteredData.length === 0) {
            alert(`Index එක හරි, හැබැයි City/Batch හරියට match වුනේ නෑ. 
            Database එකේ තියෙන Data: City=${data[0].city}, Batch=${data[0].batch}
            URL එකේ එන Data: City=${targetCity}, Batch=${targetBatch}`);
            document.getElementById('loadingOverlay').style.display = 'none';
            return;
        }

        // Step 3: හැමදේම හරි නම් දත්ත පෙන්වන්න
        allStudentData = filteredData; 
        const latestExam = filteredData[filteredData.length - 1];

    // 1. කලින්ම Grade එක හදාගන්න
    const currentGrade = getGrade(latestExam.marks);

    document.getElementById('sName').innerText = latestExam.student_name || "STUDENT";
    document.getElementById('sIndexDisplay').innerText = indexInput;
    document.getElementById('sCity').innerText = latestExam.city || "-";
    document.getElementById('sBatch').innerText = latestExam.batch || "-";

    // 2. Grade එක සහ නිවැරදි Variable (latestExam) එක පාවිච්චි කරන්න
    document.getElementById('sGrade').innerText = currentGrade;
    document.getElementById('sMarks').innerText = latestExam.marks + "%";

    // W නම් Rank එක '-' කරන Logic එක
    document.getElementById('sRank').innerText = (currentGrade === 'W') ? "-" : (latestExam.rank || "-");

    document.getElementById('resultContainer').style.display = 'block';

        setTimeout(focusOnResult, 100);
        setTimeout(() => document.getElementById('resultContainer').style.opacity = '1', 50);

        switchTab(latestExam.exam_type); 

        window.scrollTo({ top: 350, behavior: 'smooth' });

    } catch (err) {
        console.error("Error:", err);
        alert("System error!");
    } finally {
        document.getElementById('loadingOverlay').style.display = 'none';
    }
}

// 2. Tab Switch Function
// 2. Tab Switch Function
function switchTab(type) {
    // 1. Database එකේ එන Type එක අනුව Tab ID එක තෝරගන්න
    let targetTabId = "";
    const typeLower = type.toLowerCase();

    if (typeLower.includes("unit")) {
        targetTabId = "unitTab"; // HTML එකේ තියෙන ID එක
    } else {
        targetTabId = "megaTab"; // HTML එකේ තියෙන ID එක
    }

    // 2. Button වල active class එක අයින් කරන්න
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

    // 3. නිවැරදි ID එකට active class එක දාන්න
    const activeBtn = document.getElementById(targetTabId);
    if (activeBtn) {
        activeBtn.classList.add('active');
    }

    // 4. Data Filter කිරීම
    const currentData = allStudentData.filter(item => 
        item.exam_type.toLowerCase() === typeLower
    );

    const tbody = document.getElementById('tableBody');

    // 5. දත්ත පෙන්වීම
    if (currentData.length === 0) {
        tbody.innerHTML = "<tr><td colspan='5' class='text-center py-4'>No records found</td></tr>";
        return;
    }

    const latestResult = currentData[currentData.length - 1];
    const currentGrade = getGrade(latestResult.marks); // Grade එක මුලින්ම ගන්න

    // Card එකේ දත්ත Update කිරීම
    document.getElementById('sExamName').innerText = latestResult.exam_type.toUpperCase() + " " + latestResult.exam_number;
    document.getElementById('sMarks').innerText = latestResult.marks + "%";
    document.getElementById('sGrade').innerText = currentGrade;

    // මෙන්න මේ පේළිය වෙනස් කරන්න:
    // Grade එක 'W' නම් Rank එකට "-" දානවා, නැත්නම් Rank එක පෙන්වනවා.
    document.getElementById('sRank').innerText = (currentGrade === 'W') ? "-" : (latestResult.rank || "-");

tbody.innerHTML = [...currentData].reverse().map(row => {
    // Row එක ඇතුළෙදි grade එක check කරනවා
    const rowGrade = getGrade(row.marks);
    const rowRank = (rowGrade === 'W') ? "-" : (row.rank || '-');

    return `
        <tr class="border-b border-white/5 row-fade-hover cursor-pointer">
            <td class="font-bold text-white/80 uppercase text-[11px] tracking-wider">${row.exam_type.toUpperCase()} ${row.exam_number}</td>
            <td class="text-2xl md:text-4xl font-black text-[#D4AF37] italic table-val">${row.marks}%</td>
            <td class="text-2xl md:text-4xl font-black text-[#D4AF37] italic table-val">${rowGrade}</td>
            <td class="text-2xl md:text-4xl font-black text-white italic table-val">${rowRank}</td>
        </tr>
    `;
}).join('');

    updateChart(currentData);
}

// 3. Chart Function
function updateChart(data) {
    const canvas = document.getElementById('performanceChart');
    if (!canvas) return; // Canvas එක නැත්නම් stop කරන්න
    
    const ctx = canvas.getContext('2d');
    if (myChart) myChart.destroy();
    
    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: data.map(d => `${d.exam_type.charAt(0).toUpperCase()}${d.exam_number}`),
            datasets: [{
                data: data.map(d => d.marks),
                borderColor: '#D4AF37',
                backgroundColor: 'rgba(212, 175, 55, 0.1)',
                fill: true,
                tension: 0.4,
                borderWidth: 3,
                pointRadius: 5,
                pointBackgroundColor: '#fff'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                y: { beginAtZero: true, max: 100, grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#444', font: {size: 9} } },
                x: { grid: { display: false }, ticks: { color: '#444', font: {size: 9} } }
            }
        }
    });
}
// Card එකට focus කරන function එක
function focusOnResult() {
    const card = document.querySelector('.profile-card');
    if (card) {
        // 1. Smooth විදියට Card එක තියෙන තැනට Scroll කරනවා
        card.scrollIntoView({ 
            behavior: 'smooth', 
            block: 'center' 
        });

        // 2. Card එකට "Flash" හෝ "Bounce" එකක් දීලා Highlight කරනවා
        card.style.transition = "transform 0.3s ease, box-shadow 0.3s ease";
        card.style.transform = "scale(1.03)";
        card.style.boxShadow = "0 0 30px rgba(212, 175, 55, 0.4)";

        // 3. තත්පරයකින් ආපහු normal තත්වයට ගේනවා
        setTimeout(() => {
            card.style.transform = "scale(1)";
            card.style.boxShadow = "none";
        }, 500);
    }
}
function getGrade(marks) {
    if (marks >= 75) return 'A';
    if (marks >= 65) return 'B';
    if (marks >= 50) return 'C';
    if (marks >= 35) return 'S';
    return 'W';
}
